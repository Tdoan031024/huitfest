<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xem Truoc Ve Email/PDF</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a33;
      --line: #26345f;
      --text: #e6ecff;
      --muted: #98a8d8;
      --accent: #2f6df6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #182449 0%, var(--bg) 48%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .toolbar {
      background: rgba(18, 26, 51, 0.92);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .toolbar input {
      width: 140px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid #3b4b7a;
      background: #0d1530;
      color: var(--text);
      padding: 0 10px;
      font-size: 14px;
      outline: none;
    }

    .toolbar button,
    .toolbar a {
      height: 38px;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar button {
      background: var(--accent);
      border-color: #4a7ef2;
    }

    .toolbar a {
      background: #1f8f5a;
      border-color: #2cad72;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .panel {
      background: rgba(18, 26, 51, 0.92);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      min-height: 76vh;
      display: flex;
      flex-direction: column;
    }

    .panel h3 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      color: #dbe6ff;
      background: rgba(9, 15, 33, 0.75);
    }

    iframe {
      width: 100%;
      height: 100%;
      flex: 1;
      border: none;
      background: #fff;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .panel { min-height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <label for="registrationId">Registration ID</label>
      <input id="registrationId" type="number" min="1" placeholder="VD: 69" />
      <button id="previewBtn" type="button">Xem truoc</button>
      <a id="openPdf" target="_blank" rel="noopener">Mo PDF tab moi</a>
      <span class="hint">Nhap ID dang ky, nhan Xem truoc de xem email va file PDF truoc khi gui that.</span>
    </div>

    <div class="grid">
      <section class="panel">
        <h3>Noi dung Email</h3>
        <iframe id="emailFrame" title="Email Preview"></iframe>
      </section>
      <section class="panel">
        <h3>Noi dung PDF Ve</h3>
        <iframe id="pdfFrame" title="PDF Preview"></iframe>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const runningUnderNodeApi = window.location.pathname === '/nodeapi' || window.location.pathname.startsWith('/nodeapi/');
      const basePrefix = runningUnderNodeApi ? '/nodeapi' : '';
      const apiBase = `${basePrefix}/api`;

      const idInput = document.getElementById('registrationId');
      const previewBtn = document.getElementById('previewBtn');
      const emailFrame = document.getElementById('emailFrame');
      const pdfFrame = document.getElementById('pdfFrame');
      const openPdf = document.getElementById('openPdf');

      const runPreview = () => {
        const id = Number(idInput.value);
        if (!Number.isFinite(id) || id <= 0) {
          alert('Vui long nhap Registration ID hop le.');
          return;
        }

        const emailUrl = `${apiBase}/registrations/admin/${encodeURIComponent(String(id))}/preview-ticket-email`;
        const pdfUrl = `${apiBase}/registrations/admin/${encodeURIComponent(String(id))}/preview-ticket-pdf`;

        emailFrame.src = emailUrl;
        pdfFrame.src = pdfUrl;
        openPdf.href = pdfUrl;
      };

      previewBtn.addEventListener('click', runPreview);
      idInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') runPreview();
      });

      const queryId = Number(new URLSearchParams(window.location.search).get('id'));
      if (Number.isFinite(queryId) && queryId > 0) {
        idInput.value = String(queryId);
        runPreview();
      }
    })();
  </script>
</body>
</html>
